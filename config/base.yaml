zotero:
  user_id: ??? # User ID of your Zotero account.
  api_key: ??? # An Zotero API key with read access.
  include_path: null # A list of glob patterns marking the Zotero collections that should be included. Example: ["2026/survey/**","2026/reading-group/**"]
  ignore_path: null # A list of glob patterns marking the Zotero collections that should be excluded. Example: ["2026/ignore/**","archive/**"]

source:
  arxiv:
    category: null # The categories of target arxiv papers. Find the abbr of your research area from [here](https://arxiv.org/category_taxonomy). Example: ["cs.AI","cs.CV","cs.LG","cs.CL"]
    include_cross_list: false # Whether to include arXiv cross-list papers in subscribed categories. Example: true
    max_batch_retries: 2
    batch_retry_delay: 20
    request_delay: 3
    convert_delay: 0
  biorxiv:
    category: null # The categories of target biorxiv papers. Find categories from [here](https://www.biorxiv.org/). Example: ["biochemistry","animal behavior and cognition"]
  medrxiv:
    category: null # The categories of target medrxiv papers. Find categories from [here](https://www.medrxiv.org/) Example: ["psychiatry and clinical psychology", "neurology"]
  ccf_dblp:
    ccf_json_path: data/ccf2026_entries.json # JSON converted from the CCF 2026 PDF.
    types: ["期刊","会议"] # CCF entry types to monitor. Example: ["期刊"].
    fields: ["网络与信息安全","计算机科学理论"] # CCF fields relevant to FHE/PQC/cryptography.
    ranks: ["A","B"] # CCF ranks to monitor.
    start_date: null # Inclusive DBLP update start date, yyyy-mm-dd. If null, use lookback_days.
    end_date: null # Inclusive DBLP update end date, yyyy-mm-dd. If null with start_date, use today.
    lookback_days: 7 # Used only when start_date and end_date are both null.
    keyword_required: true # If true, only keep titles/venues matching keywords before reranking.
    keywords: ["fully homomorphic","homomorphic encryption","fhe","tfhe","ckks","bfv","bgv","bootstrapping","programmable bootstrapping","lattice","lattice-based","lwe","rlwe","lwr","sis","ntru","post-quantum","post quantum","pqc","kyber","dilithium","falcon","ml-kem","ml-dsa","kem","key encapsulation","public-key","public key","public-key encryption","commitment","polynomial commitment","vector commitment"]
    max_venues: null # Limit venues for smoke tests.
    max_papers: null # Limit papers for smoke tests.
    request_timeout: 30
    request_retries: 3
    request_delay: 1.0
    proxy: null # Optional HTTP/SOCKS proxy URL for DBLP requests. Example: http://127.0.0.1:7890
  ccf_openalex:
    ccf_json_path: data/ccf2026_entries.json # JSON converted from the CCF 2026 PDF.
    source_cache_path: outputs/ccf2026/openalex_sources_cache.json
    types: ["期刊","会议"]
    fields: ["网络与信息安全","计算机科学理论"]
    ranks: ["A","B"]
    start_date: null # Inclusive publication start date, yyyy-mm-dd. If null, use lookback_days.
    end_date: null # Inclusive publication end date, yyyy-mm-dd. If null with start_date, use today.
    lookback_days: 7
    keyword_required: true # If true, only keep works matching keywords before reranking.
    search_queries: ["homomorphic encryption","post quantum cryptography","lattice cryptography","lattice based cryptography","public key cryptography","commitment scheme"]
    keywords: ["fully homomorphic","homomorphic encryption","fhe","tfhe","ckks","bfv","bgv","bootstrapping","programmable bootstrapping","lattice","lattice-based","lwe","rlwe","lwr","sis","ntru","post-quantum","post quantum","pqc","kyber","dilithium","falcon","ml-kem","ml-dsa","kem","key encapsulation","public-key","public key","public-key encryption","commitment","polynomial commitment","vector commitment"]
    max_venues: null
    max_papers: null
    per_page: 25
    mailto: null # Optional contact email for OpenAlex polite pool.
    request_timeout: 30
    request_retries: 3
    request_delay: 3.0
    rate_limit_wait: 120.0
    max_rate_limit_wait: 900.0
    proxy: null # Optional HTTP/SOCKS proxy URL for OpenAlex requests.
  ccf_crossref:
    ccf_json_path: data/ccf2026_entries.json # JSON converted from the CCF 2026 PDF.
    types: ["期刊","会议"]
    fields: ["网络与信息安全","计算机科学理论"]
    ranks: ["A","B"]
    start_date: null # Inclusive publication start date, yyyy-mm-dd. If null, use lookback_days.
    end_date: null # Inclusive publication end date, yyyy-mm-dd. If null with start_date, use today.
    lookback_days: 7
    keyword_required: true
    query_mode: venue # venue: one Crossref request per CCF venue, then local keyword filtering. title: one request per search query.
    search_queries: ["fully homomorphic encryption","FHE circuit construction","lattice cryptography","lattice based cryptography","public key cryptography","commitment scheme"]
    keywords: ["fully homomorphic","homomorphic encryption","fhe","tfhe","ckks","bfv","bgv","bootstrapping","programmable bootstrapping","fhe circuit","lattice","lattice-based","lattice based","lwe","rlwe","lwr","sis","ntru","post-quantum","post quantum","pqc","kyber","dilithium","falcon","ml-kem","ml-dsa","kem","key encapsulation","public-key","public key","public-key encryption","commitment","polynomial commitment","vector commitment"]
    max_venues: null
    max_papers: null
    rows: 100
    mailto: null # Optional contact email for Crossref polite pool.
    request_timeout: 30
    request_retries: 3
    request_delay: 1.0
    rate_limit_waits: [30, 60, 120]
    proxy: null # Optional HTTP/SOCKS proxy URL for Crossref requests.
  iacr_eprint:
    feed_url: https://eprint.iacr.org/rss/rss.xml
    categories: ["Public-key cryptography","Foundations","Implementation"]
    lookback_days: 1
    start_date: null
    end_date: null
    keyword_required: true
    search_queries: ["fully homomorphic encryption","FHE circuit construction","lattice cryptography","lattice based cryptography","public key cryptography","commitment scheme"]
    keywords: ["fully homomorphic","homomorphic encryption","fhe","tfhe","ckks","bfv","bgv","bootstrapping","programmable bootstrapping","fhe circuit","lattice","lattice-based","lattice based","lwe","rlwe","lwr","sis","ntru","post-quantum","post quantum","pqc","kyber","dilithium","falcon","ml-kem","ml-dsa","kem","key encapsulation","public-key","public key","public-key encryption","commitment","polynomial commitment","vector commitment"]
    max_papers: null
    request_timeout: 30
    request_delay: 1.0
    proxy: null

email:
  sender: ??? # The email account of the SMTP server that sends you email. Example: abc@qq.com
  receiver: ??? # The email account that receives the paper list. Example: abc@outlook.com
  smtp_server: ??? # The SMTP server that sends the email. Ask your email provider (Gmail, QQ, Outlook, ...) for its SMTP server. Example: smtp.qq.com
  smtp_port: ??? # The port of SMTP server. Example: 465
  sender_password: ??? # The password of the sender account. Note that it's not necessarily the password for logging in the e-mail client, but the authentication code for SMTP service. Ask your email provider for this. Example: abcdefghijklmn

llm:
  api:
    key: ??? # API Key of your LLM API. Example: sk-xxx
    base_url: ??? # API URL of your LLM API. Example: https://api.openai.com/v1
  generation_kwargs:
  # Arguments for the LLM API. See [here](https://platform.openai.com/docs/api-reference/chat/create) for more details.
    max_tokens: 16384
    model: ???
  language: English # Preferred language for the TL;DR. Example: English

reranker:
  local:
    model: jinaai/jina-embeddings-v5-text-nano-retrieval # The Hugging Face model name of the local embedding model. Example: jinaai/jina-embeddings-v5-text-nano
    encode_kwargs:
    # The kwargs for the encode method of the local embedding model. Details see [here](https://www.sbert.net/docs/package_reference/SentenceTransformer.html#sentence_transformers.SentenceTransformer.encode)
      task: retrieval
      prompt_name: document
  api:
    key: null # API Key of your embedding model API. Example: sk-xxx
    base_url: null # API URL of your embedding model API. Example: https://api.openai.com/v1
    model: null # The model name of the embedding model. Example: text-embedding-3-large
    batch_size: null # The batch size for embedding API requests. Adjust to match your provider's limit. Example: 64

executor:
  debug: false # Whether to use debug mode. Example: true
  send_empty: false # Whether to send an empty email even if no new papers today. Example: true
  max_paper_num: 100 # The maximum number of the papers presented in the email. Example: 100
  source: ??? # The sources of papers to retrieve. Example: ['arxiv','biorxiv','medrxiv']
  reranker: local # The reranker to use. Example: 'local' or 'api'
