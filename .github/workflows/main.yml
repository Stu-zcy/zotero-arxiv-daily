name: Send paper digest

on:
  # 09:00 Asia/Shanghai = 01:00 UTC.
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Digest mode"
        required: true
        default: daily
        type: choice
        options:
          - daily
          - iacr-range
      user:
        description: "Recipient profile"
        required: true
        default: all
        type: choice
        options:
          - all
          - chenyang
          - liruoyi
      start_date:
        description: "Start date for iacr-range (YYYY-MM-DD)"
        required: false
        type: string
      end_date:
        description: "End date for iacr-range (YYYY-MM-DD)"
        required: false
        type: string
      send_empty:
        description: "Send an email even when no papers match"
        required: false
        default: false
        type: boolean

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run digest for all users
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          LIRUOYI_ZOTERO_ID: ${{ secrets.LIRUOYI_ZOTERO_ID }}
          LIRUOYI_ZOTERO_KEY: ${{ secrets.LIRUOYI_ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
        run: |
          user_args=(--all-users)
          if [ "${{ inputs.user || 'all' }}" != "all" ]; then
            user_args=(--user "${{ inputs.user }}")
          fi
          args=(run src/zotero_arxiv_daily/main.py "${user_args[@]}" --mode "${{ inputs.mode || 'daily' }}" --send-email "${{ github.event_name == 'schedule' || inputs.send_empty }}" executor.max_paper_num=10)
          if [ "${{ inputs.mode || 'daily' }}" = "iacr-range" ]; then
            args+=(--start-date "${{ inputs.start_date }}" --end-date "${{ inputs.end_date }}")
          fi
          uv "${args[@]}"
